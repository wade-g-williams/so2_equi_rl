# Pre-commit config for so2_equi_rl.
# Hooks run against source code we wrote. Training outputs, reference
# papers, and the vendored AAAI template are excluded so the fixers
# don't rewrite machine-generated data or upstream files.

exclude: '^(outputs/|reference/|report/aaai2026\.(bst|sty)$)'

repos:
  # Basic file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict

  # Python formatting
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black

  # Python linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.2
    hooks:
      - id: ruff
        args: ['--fix']
